appId: com.whisperio.app
productName: Whisperio
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
asarUnpack:
  - "node_modules/koffi/**"
extraResources:
  - from: icons/whisperio.ico
    to: icons/whisperio.ico
  - from: icons/whisperio.png
    to: icons/whisperio.png
publish:
  provider: github
  owner: draenger
  repo: whisperio

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  # No spaces — GitHub rewrites spaces to dots in asset names, which breaks the
  # filename match in latest.yml and makes auto-update 404 ("exec not found").
  artifactName: ${productName}-Setup-${version}.${ext}

mac:
  icon: build/icon.png
  # Custom entitlements: the electron-builder default omits the microphone entitlement,
  # which the hardened runtime requires. Without it getUserMedia returns a SILENT stream
  # (no prompt, no error) so recordings are empty and every transcription comes back "".
  # The inherit file carries the mic entitlement into Chromium's audio child process.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # Sign with Developer ID + notarize so macOS auto-update validates (Squirrel.Mac
  # rejects ad-hoc/unsigned updates). Credentials come from CI env / GitHub Secrets;
  # the Team ID is passed via the APPLE_TEAM_ID env var (electron-builder deprecated
  # notarize.teamId). The CI mac job has a hard timeout so a hung Apple notary
  # can't burn minutes.
  notarize: true
  target:
    # zip is REQUIRED for auto-update on macOS (Squirrel.Mac can't update from a .dmg).
    # latest-mac.yml then references the zip and electron-updater downloads it.
    - target: zip
      arch:
        - x64
        - arm64
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  icon: icons/whisperio.png
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
