name: Build & Release

on:
  push:
    branches: [release]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read version from package.json
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build

      - name: Package installer
        run: npx electron-builder --${{ matrix.platform }} --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Diagnostic: report the macOS app's signing state. We intentionally ship
      # UNSIGNED builds for now (see README — right-click→Open / xattr workaround),
      # so this only WARNS; it must not block the release. Re-promote to a hard
      # failure once real code-signing (Developer ID / ad-hoc) is wired up.
      - name: Report macOS code signature (non-blocking)
        if: matrix.platform == 'mac'
        run: |
          for APP in dist/mac/Whisperio.app dist/mac-arm64/Whisperio.app; do
            [ -d "$APP" ] || continue
            echo "Checking signature: $APP"
            if codesign -dv "$APP" 2>&1 && codesign --verify --deep --strict "$APP" 2>&1; then
              echo "OK: $APP is signed"
            else
              echo "::warning::$APP is not code-signed — shipping unsigned (documented in README)"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Whisperio-${{ matrix.platform }}-${{ steps.version.outputs.version }}
          path: |
            dist/Whisperio Setup *.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/latest.yml
            dist/latest-mac.yml
            dist/latest-linux.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Whisperio v${{ steps.version.outputs.version }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/latest.yml
            artifacts/**/latest-mac.yml
            artifacts/**/latest-linux.yml
          generate_release_notes: true
