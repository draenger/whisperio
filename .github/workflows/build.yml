name: Build & Release

on:
  push:
    branches: [release]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read version from package.json
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build

      - name: Prepare macOS notary key
        if: matrix.platform == 'mac'
        run: |
          mkdir -p "$RUNNER_TEMP/notary"
          # The .p8 is a plain-text PEM key — store it raw (no base64), much less fragile.
          printf '%s\n' "${{ secrets.APPLE_API_KEY_P8 }}" > "$RUNNER_TEMP/notary/AuthKey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/notary/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Package installer
        run: npx electron-builder --${{ matrix.platform }} --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS Developer ID signing — only set on the mac runner (a mac .p12 must
          # never be fed to the Windows/Linux signers).
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          # Notarization via App Store Connect API key (APPLE_API_KEY path set above).
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      # Diagnostic: report the macOS app's signing state. We intentionally ship
      # UNSIGNED builds for now (see README — right-click→Open / xattr workaround),
      # so this only WARNS; it must not block the release. Re-promote to a hard
      # failure once real code-signing (Developer ID / ad-hoc) is wired up.
      - name: Report macOS code signature (non-blocking)
        if: matrix.platform == 'mac'
        run: |
          for APP in dist/mac/Whisperio.app dist/mac-arm64/Whisperio.app; do
            [ -d "$APP" ] || continue
            echo "Checking signature: $APP"
            if codesign -dv "$APP" 2>&1 && codesign --verify --deep --strict "$APP" 2>&1; then
              echo "OK: $APP is signed"
            else
              echo "::warning::$APP is not code-signed — shipping unsigned (documented in README)"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Whisperio-${{ matrix.platform }}-${{ steps.version.outputs.version }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/latest.yml
            dist/latest-mac.yml
            dist/latest-linux.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Whisperio v${{ steps.version.outputs.version }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/latest.yml
            artifacts/**/latest-mac.yml
            artifacts/**/latest-linux.yml
          generate_release_notes: true
